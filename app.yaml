apiVersion: v1
kind: Namespace
metadata:
  name: demo
  annotations:
    linkerd.io/inject: enabled

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
      annotations:
        config.linkerd.io/workload-kind: deployment
    spec:
      containers:
        - name: user-service
          image: service-registry:latest
          imagePullPolicy: Never
          command: ["python", "example_service.py"]
          args: ["user-service", "8001"]
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: PYTHONUNBUFFERED
              value: "1"
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: demo
spec:
  selector:
    app: user-service
  ports:
    - port: 80
      targetPort: 8001

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
      annotations:
        config.linkerd.io/workload-kind: deployment
    spec:
      containers:
        - name: payment-service
          image: service-registry:latest
          imagePullPolicy: Never
          command: ["python", "example_service.py"]
          args: ["payment-service", "8002"]
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: PYTHONUNBUFFERED
              value: "1"
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: demo
spec:
  selector:
    app: payment-service
  ports:
    - port: 80
      targetPort: 8002
